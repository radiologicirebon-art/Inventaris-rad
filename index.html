<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSMP | Radiologi Inventory PRO</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☢️</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .active-menu { background: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .glass-card { background: rgba(255, 255, 255, 1); border: 1px solid #e2e8f0; }
        .hidden { display: none; }
        
        /* Mobile Sidebar Logic */
        @media (max-width: 1024px) {
            #sidebar { transform: translateX(-100%); transition: transform 0.3s ease; position: fixed; z-index: 100; height: 100vh; }
            #sidebar.open { transform: translateX(0); }
            #overlay { display: none; }
            #overlay.show { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; }
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-700">

    <div id="overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-72 bg-[#0f172a] text-slate-400 p-6 flex flex-col shrink-0 border-r border-slate-800 lg:static">
        <div class="flex items-center justify-between mb-10 px-2">
            <div class="flex items-center gap-3 text-white">
                <div class="bg-yellow-500 p-2 rounded-lg text-slate-900"><i data-lucide="radiation" class="w-6 h-6"></i></div>
                <div>
                    <span class="text-lg font-bold block leading-none tracking-tight">RSMP <span class="text-yellow-500 text-xs uppercase">Rad Pro</span></span>
                    <span class="text-[9px] text-slate-500 uppercase font-bold">Inventory System v.1</span>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden text-slate-400"><i data-lucide="x"></i></button>
        </div>

        <nav class="flex-1 space-y-2">
            <button onclick="showPage('dashboard')" id="btn-dashboard" class="menu-link active-menu w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all">
                <i data-lucide="layout-grid" class="w-5 h-5"></i> <span class="font-medium">Dashboard</span>
            </button>
            <button onclick="showPage('inventory')" id="btn-inventory" class="menu-link w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all">
                <i data-lucide="database" class="w-5 h-5"></i> <span class="font-medium">Inventaris Alat</span>
            </button>
            <button onclick="showPage('logs')" id="btn-logs" class="menu-link w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all">
                <i data-lucide="file-clock" class="w-5 h-5"></i> <span class="font-medium">Audit Trail</span>
            </button>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-800 px-2">
            <p class="text-[10px] uppercase font-bold text-slate-500 mb-2">Developed By</p>
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold">IR</div>
                <p class="text-sm font-bold text-white">Ino Rad</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden w-full">
        
        <header class="h-16 lg:h-20 bg-white border-b px-4 lg:px-8 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-slate-100 rounded-lg"><i data-lucide="menu" class="w-5 h-5"></i></button>
                <h1 id="page-title" class="text-lg lg:text-xl font-bold text-slate-900 truncate">Dashboard</h1>
            </div>
            <button onclick="toggleModal('modal-add')" class="bg-blue-600 hover:bg-blue-700 text-white p-2 lg:px-5 lg:py-2.5 rounded-lg lg:rounded-xl text-sm font-bold flex items-center gap-2">
                <i data-lucide="plus" class="w-5 h-5 lg:w-4 lg:h-4"></i> <span class="hidden lg:inline">Alat Baru</span>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scroll">
            
            <div id="page-dashboard" class="page-content space-y-6">
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-6">
                    <div class="glass-card p-4 lg:p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
                        <p class="text-slate-400 text-[9px] font-bold uppercase">Total Unit</p>
                        <h2 id="stat-total" class="text-2xl lg:text-4xl font-black text-slate-800">0</h2>
                    </div>
                    <div class="glass-card p-4 lg:p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500">
                        <p class="text-slate-400 text-[9px] font-bold uppercase">Aktif</p>
                        <h2 id="stat-aktif" class="text-2xl lg:text-4xl font-black text-emerald-600">0</h2>
                    </div>
                    <div class="glass-card p-4 lg:p-6 rounded-2xl shadow-sm border-b-4 border-red-500">
                        <p class="text-slate-400 text-[9px] font-bold uppercase">Rusak</p>
                        <h2 id="stat-rusak" class="text-2xl lg:text-4xl font-black text-red-600">0</h2>
                    </div>
                    <div class="glass-card p-4 lg:p-6 rounded-2xl shadow-sm border-b-4 border-yellow-500">
                        <p class="text-slate-400 text-[9px] font-bold uppercase">Bapeten Exp</p>
                        <h2 id="stat-bapeten" class="text-2xl lg:text-4xl font-black text-yellow-600">0</h2>
                    </div>
                </div>

                <div class="glass-card rounded-2xl p-4 lg:p-6">
                    <h3 class="font-bold text-sm mb-4 flex items-center gap-2"><i data-lucide="alert-circle" class="w-4 h-4 text-yellow-500"></i> Monitoring Bapeten</h3>
                    <div class="overflow-x-auto custom-scroll">
                        <table class="w-full text-left min-w-[500px]">
                            <tbody id="bapeten-monitoring" class="divide-y divide-slate-50">
                                <tr><td class="py-4 text-xs text-slate-400 italic">Belum ada data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="page-inventory" class="page-content hidden">
                <div class="glass-card rounded-2xl overflow-hidden shadow-sm overflow-x-auto custom-scroll">
                    <table class="w-full text-left min-w-[800px]">
                        <thead class="bg-slate-50 text-[10px] uppercase tracking-widest font-bold">
                            <tr>
                                <th class="px-6 py-4">ID Inventaris</th>
                                <th class="px-6 py-4">Alat & Merek</th>
                                <th class="px-6 py-4">Lokasi</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table" class="text-sm divide-y divide-slate-100 bg-white"></tbody>
                    </table>
                </div>
            </div>

            <div id="page-logs" class="page-content hidden">
                <div class="max-w-2xl mx-auto space-y-4" id="log-list"></div>
            </div>

        </div>
    </main>

    <div id="modal-add" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[150] hidden flex items-center justify-center p-2 lg:p-4">
        <div class="bg-white rounded-2xl lg:rounded-3xl shadow-2xl w-full max-w-lg max-h-[95vh] overflow-y-auto custom-scroll">
            <div class="p-5 lg:p-6 border-b flex justify-between items-center sticky top-0 bg-white">
                <h3 class="font-bold text-lg">Input Alat Radiologi</h3>
                <button onclick="toggleModal('modal-add')" class="p-2"><i data-lucide="x"></i></button>
            </div>
            
            <form id="form-add-equipment" class="p-5 lg:p-6 space-y-4">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">No. Inventaris (Auto)</label>
                        <input name="kode" id="auto-kode" type="text" readonly class="w-full px-4 py-2.5 bg-slate-100 rounded-xl font-mono text-blue-600 font-bold outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Nama Alat</label>
                        <input name="nama" type="text" required class="w-full px-4 py-2.5 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Merek / Tipe</label>
                    <input name="merk_type" type="text" required class="w-full px-4 py-2.5 border rounded-xl outline-none">
                </div>

                <div class="p-4 bg-yellow-50 rounded-xl border border-yellow-100 space-y-3">
                    <p class="text-[10px] font-bold text-yellow-700 uppercase tracking-wider">Informasi Bapeten</p>
                    <input id="input-no-bapeten" name="no_bapeten" type="text" placeholder="Nomor Bapeten" class="w-full px-4 py-2 border border-yellow-200 rounded-lg text-sm">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="tgl-terbit" name="tgl_terbit" type="date" disabled class="w-full px-3 py-2 border border-yellow-200 rounded-lg text-xs">
                        <input id="tgl-berakhir" name="tgl_berakhir" type="date" disabled class="w-full px-3 py-2 border border-yellow-200 rounded-lg text-xs">
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Lokasi</label>
                        <input name="lokasi" type="text" required class="w-full px-4 py-2.5 border rounded-xl">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Risiko</label>
                        <select name="risiko" class="w-full px-4 py-2.5 border rounded-xl">
                            <option value="low">Low Risk</option>
                            <option value="medium">Medium Risk</option>
                            <option value="high">High Risk</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Link Google Drive</label>
                    <input name="link_file" type="url" placeholder="https://drive.google.com/..." class="w-full px-4 py-2.5 border rounded-xl text-sm">
                </div>

                <button type="submit" class="w-full py-4 bg-slate-900 text-white font-bold rounded-xl mt-4">SIMPAN DATA</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9vzs1ddViMPx4DtfK2ny2v5booWJGEZA",
            authDomain: "inventaris-alat-rad.firebaseapp.com",
            databaseURL: "https://inventaris-alat-rad-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "inventaris-alat-rad",
            storageBucket: "inventaris-alat-rad.firebasestorage.app",
            messagingSenderId: "273303382914",
            appId: "1:273303382914:web:2db485573f130636513d9b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const eqRef = ref(db, 'equipment');
        const logRef = ref(db, 'logs');

        let eqData = {};

        onValue(eqRef, (snapshot) => {
            eqData = snapshot.val() || {};
            const count = Object.keys(eqData).length + 1;
            document.getElementById('auto-kode').value = `RSMP-RAD-${String(count).padStart(3, '0')}`;
            renderUI();
        });

        onValue(logRef, (snapshot) => renderLogs(snapshot.val()));

        function renderUI() {
            const items = Object.values(eqData);
            document.getElementById('stat-total').innerText = items.length;
            document.getElementById('stat-aktif').innerText = items.filter(i => i.status === 'aktif').length;
            document.getElementById('stat-rusak').innerText = items.filter(i => i.status === 'rusak').length;
            
            // Render Table
            const table = document.getElementById('inventory-table');
            table.innerHTML = items.map(eq => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 font-mono font-bold text-blue-600">${eq.kode}</td>
                    <td class="px-6 py-4">
                        <p class="font-bold">${eq.nama}</p>
                        <p class="text-[10px] text-slate-400 uppercase">${eq.merk_type}</p>
                    </td>
                    <td class="px-6 py-4 text-xs font-medium">${eq.lokasi}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-[9px] font-black uppercase ${eq.status === 'aktif' ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}">${eq.status}</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex gap-2">
                            ${eq.link_file ? `<a href="${eq.link_file}" target="_blank" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg"><i data-lucide="external-link" class="w-4 h-4"></i></a>` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');

            // Bapeten List
            const bapetenList = document.getElementById('bapeten-monitoring');
            bapetenList.innerHTML = items.filter(i => i.no_bapeten).map(i => `
                <tr>
                    <td class="py-3 text-xs font-bold">${i.nama}</td>
                    <td class="py-3 text-[10px] text-slate-500">${i.no_bapeten}</td>
                    <td class="py-3 text-[10px] font-mono">${i.tgl_berakhir}</td>
                </tr>
            `).join('') || '<tr><td colspan="3" class="py-4 text-xs italic text-slate-400">Tidak ada data izin.</td></tr>';

            lucide.createIcons();
        }

        function renderLogs(data) {
            const container = document.getElementById('log-list');
            if(!data) return;
            container.innerHTML = Object.values(data).reverse().slice(0, 10).map(log => `
                <div class="bg-white border p-4 rounded-xl shadow-sm">
                    <div class="flex justify-between text-[10px] font-bold mb-1">
                        <span class="text-blue-600">${log.user}</span>
                        <span class="text-slate-400">${new Date(log.waktu).toLocaleString('id-ID')}</span>
                    </div>
                    <p class="text-xs text-slate-600">${log.aksi}</p>
                </div>
            `).join('');
        }

        document.getElementById('form-add-equipment').addEventListener('submit', async (e) => {
            e.preventDefault();
            const f = new FormData(e.target);
            const data = {
                kode: f.get('kode'), nama: f.get('nama'), merk_type: f.get('merk_type'),
                no_bapeten: f.get('no_bapeten'), tgl_terbit: f.get('tgl_terbit'),
                tgl_berakhir: f.get('tgl_berakhir'), lokasi: f.get('lokasi'),
                risiko: f.get('risiko'), link_file: f.get('link_file'),
                status: 'aktif', created_at: serverTimestamp()
            };
            await set(push(eqRef), data);
            await push(logRef, { user: 'Ino Rad', aksi: `Tambah ${data.nama}`, waktu: Date.now() });
            toggleModal('modal-add');
            e.target.reset();
            alert('Berhasil!');
        });

        document.getElementById('input-no-bapeten').oninput = (e) => {
            const disabled = !e.target.value.trim();
            document.getElementById('tgl-terbit').disabled = disabled;
            document.getElementById('tgl-berakhir').disabled = disabled;
        };
    </script>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active-menu'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.getElementById('btn-' + pageId).classList.add('active-menu');
            document.getElementById('page-title').innerText = pageId.charAt(0).toUpperCase() + pageId.slice(1);
            if(window.innerWidth < 1024) toggleSidebar();
            lucide.createIcons();
        }
        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }
        lucide.createIcons();
    </script>
</body>
</html>
