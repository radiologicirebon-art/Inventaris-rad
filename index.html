<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDIC-EQ | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-[#0f172a] text-slate-300 flex flex-col hidden md:flex">
        <div class="p-6 text-white font-bold text-xl flex items-center gap-2">
            <i data-lucide="activity" class="text-blue-500"></i>
            <span>MEDIC-EQ</span>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg text-white bg-blue-600"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800"><i data-lucide="database" class="w-5 h-5"></i> Inventaris</a>
            <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-800"><i data-lucide="wrench" class="w-5 h-5"></i> Maintenance</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-16 glass-card px-8 flex items-center justify-between sticky top-0 z-10">
            <h2 class="text-lg font-semibold text-slate-800">Real-time Monitoring</h2>
            <div id="connectionStatus" class="flex items-center gap-2 text-xs font-bold text-orange-500 italic">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span></span>
                CONNECTING TO FIREBASE...
            </div>
        </header>

        <div class="p-8 space-y-8">
            <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="glass-card p-6 rounded-xl border-l-4 border-blue-500">
                    <p class="text-sm font-medium text-slate-500">Alat Aktif</p>
                    <h3 id="count-aktif" class="text-3xl font-bold text-slate-800">--</h3>
                </div>
                <div class="glass-card p-6 rounded-xl border-l-4 border-red-500">
                    <p class="text-sm font-medium text-slate-500">Alat Rusak</p>
                    <h3 id="count-rusak" class="text-3xl font-bold text-slate-800">--</h3>
                </div>
                <div class="glass-card p-6 rounded-xl border-l-4 border-yellow-500">
                    <p class="text-sm font-medium text-slate-500">PM Overdue</p>
                    <h3 id="count-overdue" class="text-3xl font-bold text-slate-800">--</h3>
                </div>
                <div class="glass-card p-6 rounded-xl border-l-4 border-emerald-500">
                    <p class="text-sm font-medium text-slate-500">Compliance</p>
                    <h3 id="compliance-rate" class="text-3xl font-bold text-slate-800">--%</h3>
                </div>
            </section>

            <section class="glass-card rounded-xl shadow-sm overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                    <h4 class="font-bold text-slate-800 uppercase text-sm tracking-widest">Live Equipment Status</h4>
                </div>
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-semibold">
                        <tr>
                            <th class="px-6 py-4">ID Alat</th>
                            <th class="px-6 py-4">Nama</th>
                            <th class="px-6 py-4">Lokasi</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4">Risiko</th>
                        </tr>
                    </thead>
                    <tbody id="equipment-table-body" class="divide-y divide-slate-100 bg-white text-sm">
                        </tbody>
                </table>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi Anda
        const firebaseConfig = {
            apiKey: "AIzaSyC9vzs1ddViMPx4DtfK2ny2v5booWJGEZA",
            authDomain: "inventaris-alat-rad.firebaseapp.com",
            databaseURL: "https://inventaris-alat-rad-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "inventaris-alat-rad",
            storageBucket: "inventaris-alat-rad.firebasestorage.app",
            messagingSenderId: "273303382914",
            appId: "1:273303382914:web:2db485573f130636513d9b"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // UI Elements
        const eqTable = document.getElementById('equipment-table-body');
        const statusIndicator = document.getElementById('connectionStatus');

        // Listen to Equipment Data
        const eqRef = ref(db, 'equipment');
        onValue(eqRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Update Status UI
                statusIndicator.innerHTML = `<span class="h-2 w-2 rounded-full bg-green-500"></span> LIVE SYSTEM ACTIVE`;
                statusIndicator.className = "flex items-center gap-2 text-xs font-bold text-green-600";

                let activeCount = 0;
                let brokenCount = 0;
                eqTable.innerHTML = ''; // Clear table

                Object.keys(data).forEach(key => {
                    const eq = data[key];
                    if(eq.status === 'aktif') activeCount++;
                    if(eq.status === 'rusak') brokenCount++;

                    // Render Table Row
                    const row = `
                        <tr class="hover:bg-slate-50">
                            <td class="px-6 py-4 font-mono text-blue-600">${eq.kode || key}</td>
                            <td class="px-6 py-4 font-semibold">${eq.nama}</td>
                            <td class="px-6 py-4 text-slate-500">${eq.lokasi}</td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase ${eq.status === 'aktif' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                    ${eq.status}
                                </span>
                            </td>
                            <td class="px-6 py-4 font-bold ${eq.risiko === 'high' ? 'text-red-500' : 'text-slate-400'}">
                                ${eq.risiko ? eq.risiko.toUpperCase() : '-'}
                            </td>
                        </tr>
                    `;
                    eqTable.innerHTML += row;
                });

                // Update KPI Cards
                document.getElementById('count-aktif').innerText = activeCount;
                document.getElementById('count-rusak').innerText = brokenCount;
                // Mockup PM logic (Anda bisa kembangkan query-nya)
                document.getElementById('count-overdue').innerText = "0"; 
                document.getElementById('compliance-rate').innerText = "100%";
            }
        });

        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
